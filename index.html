<script>
const STORAGE_KEY='gongdebang_donations';
const DB_NAME='gongdebang_db';
const STORE_NAME='donations';
let _idxDB=null;

function openIDB(){return new Promise((resolve,reject)=>{if(_idxDB){resolve(_idxDB);return}const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_NAME))db.createObjectStore(STORE_NAME,{keyPath:'_id'})};req.onsuccess=e=>{_idxDB=e.target.result;resolve(_idxDB)};req.onerror=e=>reject(e.target.error)})}

async function loadData(){
  try{
    const db=await openIDB();
    return new Promise(resolve=>{
      const tx=db.transaction(STORE_NAME,'readonly');
      const req=tx.objectStore(STORE_NAME).getAll();
      req.onsuccess=()=>resolve(Array.isArray(req.result)?req.result:[]);
      req.onerror=()=>resolve([]);
    });
  }catch(e){return[]}
}

async function renderList(cat){
  const track=document.getElementById('scrollTrack');
  const mask=document.getElementById('maskTop');
  let data=await loadData();
  // 首次加载时种子数据 — 必须等待写入完成
  if(data.length===0){
    data=SEED;
    const db=await openIDB();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction(STORE_NAME,'readwrite');
      const store=tx.objectStore(STORE_NAME);
      SEED.forEach(d=>store.add(d));
      tx.oncomplete=resolve;
      tx.onerror=reject;
    });
  }
  const items=data.filter(d=>cat==="全部"?true:getCat(d.project)===cat);
  items.sort((a,b)=>a.date.localeCompare(b.date));

  // 估算条目总高度，判断是否需要滚动
  const sa=document.getElementById('scrollArea');
  const saH=sa.clientHeight;
  const estEntryH=60; // 每条目约60px(含padding)
  const estTitleH=cat!=="全部"?44:0;
  const estTotal=estTitleH+items.length*estEntryH;
  const needsScroll=estTotal>saH||cat==="全部";

  // 构建渲染列表：要滚则双倍/三倍复制，不滚就原样
  let renderList;
  if(needsScroll){
    renderList=items.length<=2
      ?[...items,{_sep:1},...items,{_sep:1},...items]
      :[...items,...items];
  }else{
    renderList=[...items];
  }

  track.innerHTML='';

  if(cat!=="全部"){
    const h=document.createElement('div');
    h.className='entry';
    const cc=CAT_COLORS[cat]||'#333';
    h.innerHTML=`<div style="text-align:center;font-size:clamp(18px,3.2vw,28px);color:${cc};font-weight:900;padding:3px 0">${cat}</div>`;
    track.appendChild(h);
    mask.style.height='18%';
  }else{
    mask.style.height='13%';
  }

  renderList.forEach(d=>{
    if(d._sep){ const se=document.createElement('div'); se.className='entry'; se.style.border='none'; se.innerHTML='<div style="height:clamp(12px,2.5vw,20px)"></div>'; track.appendChild(se); return }
    const e=document.createElement('div');
    e.className='entry';
    const hi=d.amount>=100000;
    const tyCls=d.type==="物資"?"tyWz":"tySk";
    const catC=CAT_COLORS[d.category]||'#555';
    const nm=d.name, pn=fmtProject(d.project||'');
    const dot=pn.indexOf('·');
    const pnFirst=dot>0?pn.substring(0,dot):pn;
    const pnRest=dot>0?pn.substring(dot):'';
    e.innerHTML=`
      <div class="entry-row">
        <div class="entry-left"><span class="name"><span class="marq">${nm}</span></span>${d.title?`<span class="title"><span class="marq">${d.title}</span></span>`:''}</div>
        <div class="entry-right"><span class="amount">${d.type==="物資"?`<span class="wz-label">物資價值</span>`:''}<span${hi?' class="hl"':''}>${d.amount.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span> <i>銖</i></span></div>
      </div>
      <div class="proj"><span class="pre">樂捐·</span><span class="${tyCls}">${d.type||'善款'}·</span><span class="pn"><span class="marq"><span style="color:${catC}">${pnFirst}</span><span style="color:#555">${pnRest}</span></span></span><span class="date">${d.date}</span></div>`;
    track.appendChild(e);
  });

  // 激活跑馬燈
  setTimeout(()=>{
    track.querySelectorAll('.marq').forEach(s=>{
      const pw=s.parentElement;
      if(!pw) return;
      if(s.scrollWidth>pw.clientWidth+3){
        const h=s.innerHTML;
        s.classList.add('go');
        s.innerHTML=h+'&emsp;&emsp;'+h;
      }
    });
  },200);

  // 滚动控制 — 先清除残留inline样式
  track.style.animation='';
  track.style.padding='';
  if(needsScroll){
    const spd=Math.max(8,items.length*2.5);
    track.style.setProperty('--spd',spd+'s');
  }else{
    track.style.animation='none';
    track.style.padding='0';
  }
}

function matchAny(src,qry){
  if(!src||!qry) return false;
  var ql=qry.toLowerCase();
  return src.indexOf(qry)>=0||src.toLowerCase().indexOf(ql)>=0
      ||toSimp(src).indexOf(toSimp(qry))>=0
      ||toSimp(src).indexOf(qry)>=0
      ||src.indexOf(toSimp(qry))>=0;
}

async function _doSearch(){
  var q=document.getElementById('srchInput').value.trim();
  var res=document.getElementById('searchResults');
  if(!q){res.innerHTML='<div class="sr-empty">輸入關鍵詞開始查詢（支援繁簡體）</div>';return}
  var data=await loadData();
  if(!data.length){res.innerHTML='<div class="sr-empty">暫無數據，請先由後台導入</div>';return}
  var nameMap={},projMap={};
  data.forEach(function(d){
    if(matchAny(d.name,q)){
      if(!nameMap[d.name]) nameMap[d.name]={name:d.name,count:0};
      nameMap[d.name].count++;
    }
    var pj=d.project||'',pn=fmtProject(pj);
    if(matchAny(pj,q)||matchAny(pn,q)){
      if(!projMap[pj]) projMap[pj]={project:pj,count:0,displayName:pn};
      projMap[pj].count++;
    }
  });
  var items=[];
  for(var k in nameMap) items.push({type:'name',label:nameMap[k].name,count:nameMap[k].count,key:nameMap[k].name});
  for(var k in projMap) items.push({type:'project',label:projMap[k].displayName||projMap[k].project,count:projMap[k].count,key:projMap[k].project});
  items.sort(function(a,b){return b.count-a.count});
  if(!items.length){document.getElementById('btnMultiShow').style.display='none';res.innerHTML='<div class="sr-empty">無匹配結果</div>';return}
  document.getElementById('btnMultiShow').style.display='block';
  document.getElementById('btnMultiShow').textContent='合併展示所選';
  res.innerHTML=items.map(function(item){
    var tl=item.type==='name'?'捐贈人':'樂捐項目',tc=item.type==='name'?'name':'proj';
    return '<div class="sr-item"><input type="checkbox" class="sr-cb" data-type="'+item.type+'" data-key="'+escAttr(item.key)+'" data-label="'+escAttr(item.label)+'" onclick="updateMultiBtn()"><span class="sr-type '+tc+'">'+tl+'</span><span class="sr-txt" style="cursor:pointer" onclick="selectSearch(\''+item.type+'\',\''+escAttr(item.key)+'\',\''+escAttr(item.label)+'\')">'+esc(item.label)+'</span><span class="sr-count">'+item.count+'筆</span></div>';
  }).join('');
}

  if(!cvs) return;
  var ctx=cvs.getContext('2d');
  var W,H,lines=[];
  var basePositions=[0.50]; // 一炷香
  var speedMul=0.3; // 速度×0.3

  function resize(){
    var rect=cvs.parentElement.getBoundingClientRect();
    var dpr=window.devicePixelRatio||1;
    W=rect.width;H=rect.height;
    cvs.width=W*dpr;cvs.height=H*dpr;
    cvs.style.width=W+'px';cvs.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();window.addEventListener('resize',resize);

  // 每帧生成若干条烟线
  var spawnTimer=0;
  function spawn(){
    var pos=basePositions[0];
    var x=W*pos+(Math.random()-.5)*W*0.02;
    var life=(4+Math.random()*5)/speedMul; // 秒
    lines.push({
      x:x, y:H, life:life, maxLife:life,
      vx:(Math.random()-.5)*W*0.003, // 轻微横向飘动
      sway:Math.random()*Math.PI*2, swaySpeed:0.5+Math.random()*1.5, swayAmp:W*0.003+Math.random()*W*0.008,
      alpha:0.15+Math.random()*0.2
    });
  }

  function draw(ts){
    ctx.clearRect(0,0,W,H);
    var dt=Math.min(0.05,ts?(ts-(draw._last||ts))/1000:0.016);
    draw._last=ts;

    spawnTimer+=dt*speedMul;
    // 每 0.08~0.15 秒生成一条
    while(spawnTimer>0.13+Math.random()*0.12){spawn();spawnTimer-=0.13+Math.random()*0.12}
    if(lines.length>48) lines.splice(0,lines.length-48);

    for(var i=lines.length-1;i>=0;i--){
      var l=lines[i];
      l.life-=dt;
      if(l.life<=0){lines.splice(i,1);continue}
      var t=1-l.life/l.maxLife; // 0=底部, 1=顶部
      var cy=H*(1-t*1.05);
      var sway=Math.sin(l.sway+t*l.swaySpeed*10)*l.swayAmp*(1+t*3);
      var cx=l.x+sway+l.vx*t*30;

      var fade=t<0.15?t/0.15:(t>0.7?(1-t)/0.3:1);
      var alpha=l.alpha*fade*(t>0.65?0.8:1);

      ctx.beginPath();
      ctx.moveTo(cx,cy);
      // 用贝塞尔曲线画微微弯曲的线
      var segH=H*0.3;
      var cp1x=cx+sway*0.3, cp1y=cy+segH*0.3;
      var cp2x=cx-sway*0.2, cp2y=cy+segH*0.7;
      var endX=cx-sway*0.1, endY=Math.max(0,cy+segH);
      if(endY<cy+segH*0.5) endY=cy+segH;
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,endX,Math.min(H, endY));
      ctx.strokeStyle='rgba(220,215,200,'+alpha.toFixed(3)+')';
      ctx.lineWidth=0.5+(1-t)*1.2;
      ctx.lineCap='round';
      ctx.stroke();
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

window.addEventListener('DOMContentLoaded',async()=>{await renderList("全部")});
</script>
</body>
</html>
